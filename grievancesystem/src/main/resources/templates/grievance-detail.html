<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grievance Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">📄 Grievance Details</a>
            <a href="/grievance/my" class="btn btn-light btn-sm">Back to List</a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        
        <!-- Grievance Details -->
        <div class="card">
            <div class="card-header">
                <h4 th:text="${grievance.title}">Grievance Title</h4>
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <p><strong>ID:</strong> <span th:text="${grievance.id}">#001</span></p>
                        <p><strong>Category:</strong> <span class="badge bg-secondary" th:text="${grievance.category}"></span></p>
                        <p><strong>Priority:</strong> 
                            <span class="badge" 
                                  th:classappend="${grievance.priority == 'URGENT' ? 'bg-danger' : (grievance.priority == 'HIGH' ? 'bg-warning' : (grievance.priority == 'MEDIUM' ? 'bg-info' : 'bg-success'))}"
                                  th:text="${grievance.priority}">
                            </span>
                        </p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Status:</strong> 
                            <span class="badge" 
                                  th:classappend="${grievance.status == 'PENDING' ? 'bg-warning' : (grievance.status == 'IN_PROGRESS' ? 'bg-info' : 'bg-success')}"
                                  th:text="${grievance.status}">
                            </span>
                        </p>
                        <p><strong>Submitted By:</strong> <span th:text="${grievance.user.email}"></span></p>
                        <p><strong>Submitted On:</strong> <span th:text="${#temporals.format(grievance.createdAt, 'dd MMM yyyy HH:mm')}"></span></p>
                        <p><strong>Complaint Date:</strong> <span th:text="${grievance.incidentDate != null ? #temporals.format(grievance.incidentDate, 'dd MMM yyyy') : 'N/A'}"></span></p>
                        <p th:if="${grievance.assignedTo}"><strong>Assigned To:</strong> <span th:text="${grievance.assignedTo}"></span></p>
                        <p th:if="${grievance.resolutionDays != null}" class="text-danger fw-bold">
                            <strong>Resolution Deadline:</strong> Within <span th:text="${grievance.resolutionDays}"></span> Days
                        </p>
                    </div>
                </div>
                
                <div class="mb-3">
                    <h5>Description</h5>
                    <p th:text="${grievance.description}" class="p-3 bg-light rounded"></p>
                </div>
                
                <!-- Status Update Form (for staff/admin) -->
                <div th:if="${session.userRole == 'STAFF' or session.userRole == 'ADMIN'}" class="mt-4">
                    <h5>Update Status</h5>
                    <form th:action="@{/grievance/update-status}" method="post" class="row g-3">
                        <input type="hidden" name="id" th:value="${grievance.id}">
                        <div class="col-md-6">
                            <select name="status" class="form-select" required>
                                <option value="PENDING" th:selected="${grievance.status == 'PENDING'}">Pending</option>
                                <option value="IN_PROGRESS" th:selected="${grievance.status == 'IN_PROGRESS'}">In Progress</option>
                                <option value="RESOLVED" th:selected="${grievance.status == 'RESOLVED'}">Resolved</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <button type="submit" class="btn btn-primary">Update Status</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/grievance/my" class="btn btn-secondary">← Back to My Grievances</a>
        </div>
    </div>
</body>
</html>
