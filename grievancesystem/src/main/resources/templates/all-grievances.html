<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Grievances - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .table th { background-color: #f1f3f4; }
        .status-badge { font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">📊 All Grievances</a>
            <div>
                <a href="/admin/dashboard" class="btn btn-light btn-sm">Admin Dashboard</a>
                <a href="/logout" class="btn btn-outline-light btn-sm ms-2">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>
        
        <!-- Success Message -->
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        
        <!-- Grievances Table -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">All Grievances in System</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Submitted By</th>
                                <th>Assigned To</th>
                                <th>Submitted On</th>
                                <th>Complaint Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="g : ${grievances}">
                                <td th:text="${g.id}">#1</td>
                                <td th:text="${g.title}">Title</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${g.category}"></span>
                                </td>
                                <td>
                                    <span class="badge status-badge" 
                                          th:classappend="${g.priority == 'URGENT' ? 'bg-danger' : (g.priority == 'HIGH' ? 'bg-warning' : (g.priority == 'MEDIUM' ? 'bg-info' : 'bg-success'))}"
                                          th:text="${g.priority}">
                                    </span>
                                </td>
                                <td>
                                    <span class="badge status-badge" 
                                          th:classappend="${g.status == 'PENDING' ? 'bg-warning' : (g.status == 'IN_PROGRESS' ? 'bg-info' : 'bg-success')}"
                                          th:text="${g.status}">
                                    </span>
                                </td>
                                <td th:text="${g.user.email}">user@college.edu</td>
                                <td th:text="${g.assignedTo ?: 'Not Assigned'}" class="text-muted"></td>
                                <td th:text="${#temporals.format(g.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>
                                <td th:text="${g.incidentDate != null ? #temporals.format(g.incidentDate, 'dd/MM/yyyy') : 'N/A'}">01/01/2024</td>
                                <td>
                                    <a th:href="@{/grievance/{id}(id=${g.id})}" 
                                       class="btn btn-sm btn-outline-primary">View</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(grievances)}">
                                <td colspan="9" class="text-center text-muted py-4">
                                    No grievances found in the system.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/admin/dashboard" class="btn btn-secondary">← Back to Admin Dashboard</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
