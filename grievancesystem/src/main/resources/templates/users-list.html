<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List - Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">👥 Registered Users (Test Page)</h1>
        
        <div class="card">
            <div class="card-header">
                <h4>Total Users: <span th:text="${#lists.size(users)}">0</span></h4>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Registered</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.fullName}">John Doe</td>
                            <td th:text="${user.email}">john@college.edu</td>
                            <td>
                                <span class="badge bg-primary" th:text="${user.role}">STUDENT</span>
                            </td>
                            <td th:text="${user.createdAt}">2024-01-01</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="5" class="text-center text-muted">
                                No users registered yet.
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="text-center mt-3">
                    <a href="/" class="btn btn-primary">← Back to Home</a>
                    <a href="/register" class="btn btn-success">Register Another User</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
