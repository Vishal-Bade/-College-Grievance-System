<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card text-center border-success">
            <div class="card-header bg-success text-white">
                <h3>✅ Registration Successful!</h3>
            </div>
            <div class="card-body">
                <div class="mb-4">
                    <div style="font-size: 4rem;">🎉</div>
                    <h4 class="text-success mb-3">Welcome to College Grievance System!</h4>
                    <p th:text="${message}" class="lead">Registration successful!</p>
                    
                    <div class="alert alert-info mt-4">
                        <strong>Your Details:</strong><br>
                        Name: <span th:text="${user.fullName}">User Name</span><br>
                        Email: <span th:text="${user.email}">user@college.edu</span><br>
                        Role: <span th:text="${user.role}">STUDENT</span>
                    </div>
                </div>
                
                <div class="d-grid gap-2 col-6 mx-auto">
                    <a href="/" class="btn btn-primary">Go to Homepage</a>
                    <a href="/login" class="btn btn-outline-secondary">Proceed to Login</a>
                    <a href="/users" class="btn btn-info">View All Users (Test)</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
